
name: todo_smart
description: "A to-do list app that gamifies your tasks."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  app_usage: ^4.0.1
  percent_indicator: ^4.2.5
  flutter_background_service: ^5.1.0
  shared_preferences: ^2.5.4
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  window_manager: ^0.5.1
  app_settings: ^7.0.0
  flutter_local_notifications: ^20.1.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
